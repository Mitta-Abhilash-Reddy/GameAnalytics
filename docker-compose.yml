version: '3.9'

# ── GamePulse AI – Docker Compose ─────────────────────────────
# MongoDB runs locally in Docker for development.
# In production, replace with MongoDB Atlas URI via env var.

services:

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: gamepulse-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules  # anonymous volume to preserve container node_modules
    depends_on:
      - mongo
    networks:
      - gamepulse-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: gamepulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - gamepulse-network

  # ── MongoDB (local dev only) ──────────────────────────────────
  # Comment this out when using MongoDB Atlas
  mongo:
    image: mongo:7.0
    container_name: gamepulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-gamepulse_secret}
      MONGO_INITDB_DATABASE: gamepulse
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - gamepulse-network

  # ── ML Service (Phase 5) ──────────────────────────────────────
  # ml-service:
  #   build:
  #     context: ./ml-service
  #   container_name: gamepulse-ml
  #   ports:
  #     - "8000:8000"
  #   networks:
  #     - gamepulse-network

volumes:
  mongo-data:
    driver: local

networks:
  gamepulse-network:
    driver: bridge
